      * {

      html,

        width: 100%;
        height: 100%;
        margin: 0;

      body {
        color: var(--ink);

          linear-gradient(118deg, rgba(18, 6, 9, 0.98) 0%, rgba(116, 20, 32, 0.92) 44%, rgba(29, 91, 86, 0.84) 100%),

      }

      body::before {
        position: fixed;
        inset: -22px;
        content: "";
        pointer-events: none;

          linear-gradient(90deg, rgba(16, 5, 8, 0.62), rgba(16, 5, 8, 0.32)),

        background-position: center;
        background-size: cover;
        filter: blur(16px) saturate(1.04);
        opacity: 0.36;
        transform: scale(1.06);
      }

      body::after {
        position: fixed;
        inset: 0;
        z-index: 1;
        content: "";
        pointer-events: none;
        background:
          linear-gradient(180deg, rgba(0, 0, 0, 0.42) 0%, transparent 34%, rgba(0, 0, 0, 0.36) 100%),
          repeating-linear-gradient(0deg, rgba(255, 238, 203, 0.035) 0 1px, transparent 1px 7px);
        mix-blend-mode: soft-light;
      }

      .stage {
        position: fixed;
        inset: 0;
        z-index: 2;
      }

      .stage > div {
        position: absolute;
        inset: 0;
      }

      button.is-active {
        color: #26090b;
        background: linear-gradient(90deg, #f1bd57, #ffe4a7);
        border-color: rgba(255, 246, 237, 0.82);
      }

      .seal {
        position: fixed;
        right: 34px;
        bottom: 34px;
        z-index: 4;
        display: grid;
        place-items: center;
        width: 112px;

        border-radius: 50%;
        box-shadow: inset 0 0 0 8px rgba(255, 213, 119, 0.08), 0 18px 54px rgba(0, 0, 0, 0.3);
        transform: rotate(-10deg);
      }

      .seal::before,
      .seal::after {
        position: absolute;
        inset: 10px;
        content: "";
        border: 1px solid rgba(255, 213, 119, 0.5);
        border-radius: 50%;
      }

      .seal::after {
        inset: 18px;
        border-style: dashed;
      }

      .memory-line {
        position: fixed;
        bottom: 26px;
        left: 28px;
        z-index: 4;
        display: flex;
        align-items: center;
        gap: 12px;
        color: rgba(255, 246, 237, 0.78);
        font-size: 13px;
        font-weight: 700;
        pointer-events: none;
      }

      .memory-line::before {
        width: 78px;
        height: 1px;
        content: "";
        background: linear-gradient(90deg, var(--gold), rgba(255, 255, 255, 0));
      }

      .photo-card {
        position: relative;
        width: var(--card-w);
        aspect-ratio: 3 / 2;
        overflow: hidden;
        color: #fff;
        background: #fff3e5;
        border: 1px solid rgba(255, 240, 214, 0.48);
        border-radius: 8px;
        box-shadow:
          0 12px 28px rgba(0, 0, 0, 0.3),
          0 0 28px rgba(255, 202, 101, 0.12);
        transform-style: preserve-3d;
        transition:
          filter 180ms ease,
          opacity 180ms ease,
          box-shadow 180ms ease;
        user-select: none;
      }

      .photo-card[data-kind="retouched"] {
        width: var(--feature-w);
        aspect-ratio: 2 / 3;
        border-color: rgba(255, 217, 138, 0.78);
        box-shadow:
          0 18px 36px rgba(0, 0, 0, 0.34),
          0 0 42px rgba(255, 210, 118, 0.24);
      }

      .photo-card:hover {
        filter: saturate(1.12) contrast(1.06);
        box-shadow:
          0 22px 44px rgba(0, 0, 0, 0.38),
          0 0 46px rgba(255, 216, 133, 0.34);
      }

      .photo-card img {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: cover;
        pointer-events: none;
      }

      .photo-card::before {
        position: absolute;
        inset: 0;
        content: "";
        pointer-events: none;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.18), transparent 28%),
          linear-gradient(0deg, rgba(0, 0, 0, 0.48), transparent 48%);
      }

      .photo-card::after {
        position: absolute;
        inset: 7px;
        content: "";
        pointer-events: none;
        border: 1px solid rgba(255, 255, 255, 0.24);
        border-radius: 5px;
      }

      .photo-card.is-missing {
        display: grid;
        place-items: center;
        padding: 16px;
        color: #4d1017;
        font-size: 13px;
        font-weight: 900;
        text-align: center;
      }

      .viewer {
        pointer-events: none;
        background: rgba(11, 3, 5, 0);
        opacity: 0;
        transition:
          opacity 180ms ease,
          background 180ms ease;
      }

      .viewer.is-open {
        pointer-events: auto;
        background: rgba(11, 3, 5, 0.78);
        opacity: 1;
      }

      .viewer-frame {
        opacity: 0;
        transform: translateY(34px) scale(0.62);
        transition:
          transform 360ms cubic-bezier(0.2, 0.82, 0.18, 1),
          opacity 220ms ease;
      }

      .viewer.is-open .viewer-frame {
        opacity: 1;
        transform: translateY(0) scale(1);
      }

      @media (max-width: 900px) {
        :root {
          --card-w: 128px;
          --feature-w: 140px;
        }

      }

      @media (max-width: 560px) {
        :root {
          --card-w: 106px;

        }

        .seal,
        .memory-line {
          display: none;
        }

        .viewer {
          padding: 12px;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          scroll-behavior: auto !important;
          transition-duration: 0.001ms !important;
          animation-duration: 0.001ms !important;
        }
      }

      ];

      const GOLDEN_ANGLE = Math.PI * (3 - Math.sqrt(5)); // 使用黄金角让照片分布更均匀
      const reducedMotionQuery = window.matchMedia("(prefers-reduced-motion: reduce)"); // 读取系统动效偏好
      const stage = document.querySelector("#stage"); // 获取 3D 场景容器
      const viewer = document.querySelector("#viewer"); // 获取照片预览弹层
      const viewerImage = document.querySelector("#viewerImage"); // 获取预览图片节点

      let viewerOpen = false; // 记录预览弹层打开状态
      let autoSpinEnabled = reducedMotionQuery.matches ? false : true; // 根据系统动效偏好设置自动旋转
      let pointerStart = { x: 0, y: 0 }; // 记录指针起点用于区分拖拽和点击
      let pointerMoved = false; // 记录当前指针是否已经拖动
      let pointerTracking = false; // 记录当前是否处于按下后的拖拽跟踪

      let highResToken = 0; // 记录高清图加载批次避免旧请求覆盖新预览

      const photos = retouchedFiles
        .map((fileName, index) => buildPhotoData(fileName, "retouched", index))
        .concat(rawFiles.map((fileName, index) => buildPhotoData(fileName, "raw", index))); // 合并精修和底片数据

      initScene(); // 初始化 3D 场景
      createPhotoObjects(); // 创建所有照片对象
      rebuildLayouts(); // 计算初始布局目标
      applyLayout("heart"); // 默认进入爱心布局
      animate(); // 启动逐帧动画

      function buildPhotoData(fileName, kind, localIndex) {
        // 根据文件名生成页面所需的照片数据
        const folderName = kind === "retouched" ? "精修" : "底片"; // 根据照片类型定位原始目录
        const baseName = fileName.replace(/\.[^.]+$/, ""); // 去掉扩展名以拼接缩略图文件名
        const label = kind === "retouched" ? `精修 ${baseName}` : `底片 ${baseName}`; // 根据照片类型生成显示名称
        return {
          kind,
          localIndex,
          name: fileName,
          label,
          thumb: `assets/photo-wall/thumbs/${kind}-${baseName}.jpg`,
          original: `${photoRoot}/${folderName}/${fileName}`,
        };
      }

      function initScene() {
        // 初始化相机、渲染器和控制器
        camera.position.set(0, 0, window.innerWidth < 760 ? 1880 : 1420); // 根据屏幕宽度设置初始相机距离
        scene.add(photoGroup); // 把照片分组加入场景
        renderer.setSize(window.innerWidth, window.innerHeight); // 设置渲染器尺寸
        renderer.domElement.style.position = "absolute"; // 固定渲染层定位
        renderer.domElement.style.inset = "0"; // 让渲染层铺满舞台
        stage.appendChild(renderer.domElement); // 挂载渲染器到页面
        controls.enableDamping = true; // 开启阻尼让拖拽更顺滑
        controls.dampingFactor = 0.06; // 设置阻尼强度
        controls.rotateSpeed = 0.42; // 设置拖拽旋转速度
        controls.minDistance = 760; // 限制最近观察距离
        controls.maxDistance = 2600; // 限制最远观察距离
        controls.enablePan = false; // 关闭平移避免照片墙偏出视口
        controls.autoRotate = false; // 自动旋转交给照片分组控制
        window.addEventListener("resize", handleResize); // 监听窗口变化刷新布局
        renderer.domElement.addEventListener("pointerdown", handlePointerDown, true); // 捕获阶段记录指针按下位置
        renderer.domElement.addEventListener("pointermove", handlePointerMove, true); // 捕获阶段记录拖拽移动状态
        renderer.domElement.addEventListener("pointerup", handleRendererPointerUp, true); // 捕获阶段优先处理 PC 点击预览
        renderer.domElement.addEventListener("click", handleRendererClick, true); // 捕获阶段保留点击兜底
        window.addEventListener("pointerup", handlePointerUp); // 指针抬起后停止拖拽跟踪
      }

      function createPhotoObjects() {
        // 根据照片数据创建 CSS3DObject
        photos.forEach((photo, index) => {
          const card = createPhotoCard(photo, index); // 创建单张照片卡片
          const object = new CSS3DObject(card); // 把 DOM 卡片转换为 3D 对象
          const introTarget = createIntroTarget(index, photos.length); // 生成开场分布位置
          object.position.copy(introTarget.position); // 初始化照片位置
          object.quaternion.copy(introTarget.quaternion); // 初始化照片朝向
          photoGroup.add(object); // 添加照片对象到总分组
          objects.push(object); // 保存对象以便逐帧插值
        });
      }

      function createPhotoCard(photo, index) {
        // 创建单张照片的 DOM 卡片
        const card = document.createElement("button"); // 使用按钮承载照片以支持键盘访问
        card.className = "photo-card"; // 设置照片卡片样式类
        card.type = "button"; // 指定按钮类型避免默认提交行为
        card.dataset.kind = photo.kind; // 写入照片类型供样式区分
        card.dataset.index = String(index); // 写入索引用于调试和定位
        card.setAttribute("aria-label", `${photo.label} 预览`); // 设置无障碍名称

        const img = document.createElement("img"); // 创建缩略图节点
        img.src = photo.thumb; // 设置缩略图地址
        img.alt = `${photo.label}，2026年6月7日杭州上城区领证`; // 设置图片替代文本
        img.loading = index < 28 ? "eager" : "lazy"; // 前排照片优先加载，其余延迟加载
        img.decoding = "async"; // 让浏览器异步解码图片
        img.addEventListener("error", () => {
          card.classList.add("is-missing"); // 图片缺失时标记卡片状态
          card.textContent = "图片未加载"; // 图片缺失时展示通用兜底文案
        });

        card.appendChild(img); // 把缩略图加入卡片
        card.addEventListener("pointerup", (event) => {
          event.stopPropagation(); // 阻止抬起事件继续冒泡到控制器
          pointerTracking = false; // 卡片内抬起时也结束拖拽跟踪
          pointerDownPhotoIndex = -1; // 清理按下时记录的照片索引
          if (pointerMoved) return; // 拖拽后不触发照片预览
          requestOpenViewer(index); // 用指针抬起打开当前照片预览
        });
        card.addEventListener("click", (event) => {
          event.preventDefault(); // 阻止按钮默认点击造成重复行为
          event.stopPropagation(); // 阻止点击继续冒泡到控制器
          if (pointerMoved) return; // 拖拽后不触发照片预览
          requestOpenViewer(index); // 保留键盘点击和浏览器点击兜底
        });
        return card;
      }

      function createIntroTarget(index, total) {
        // 生成球面开场目标位置
        const safeTotal = total > 0 ? total : 1; // 防止照片数量为 0 时出现除零
        const y = 1 - (index / (safeTotal - 1 || 1)) * 2; // 把索引转换到球面纵向范围
        const radiusAtY = Math.sqrt(1 - y * y); // 根据纵向位置计算横向半径
        const theta = GOLDEN_ANGLE * index; // 使用黄金角分散照片角度
        const radius = 920; // 设置开场球面半径
        const x = Math.cos(theta) * radiusAtY * radius; // 计算球面 x 坐标
        const z = Math.sin(theta) * radiusAtY * radius; // 计算球面 z 坐标
        return createFacingTarget(x, y * radius * 0.72, z, x * 2, y * radius * 0.72, z * 2, 0);
      }

      function rebuildLayouts() {
        // 根据当前视口重新计算全部布局
        targetLayouts = {
          heart: photos.map((photo, index) => buildHeartTarget(photo, index, photos.length)),
          orbit: photos.map((photo, index) => buildOrbitTarget(photo, index)),
          certificate: photos.map((photo, index) => buildCertificateTarget(photo, index)),
        }; // 保存三套布局目标
      }

      function getSceneScale() {
        // 根据屏幕宽度压缩或放大 3D 布局
        if (window.innerWidth < 560) return 0.58; // 小屏使用更紧凑的场景比例
        if (window.innerWidth < 900) return 0.76; // 中屏使用适中场景比例
        return 1; // 大屏使用完整场景比例
      }

      function buildHeartTarget(photo, index, total) {
        // 生成爱心布局中的照片位置
        const scale = getSceneScale(); // 获取当前视口缩放比例
        const safeTotal = total > 0 ? total : 1; // 防止照片数量为 0 时出现除零
        const spreadIndex = (index * 37) % safeTotal; // 打散精修和底片在爱心上的分布
        const t = (spreadIndex / safeTotal) * Math.PI * 2; // 把索引转换成心形曲线角度
        const x = 16 * Math.pow(Math.sin(t), 3); // 计算心形横坐标
        const y = 13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t); // 计算心形纵坐标
        const layer = (index % 7) - 3; // 让照片产生前后层次
        const z = layer * 74 + Math.sin(index * 0.67) * 42; // 计算照片景深位置
        const tilt = ((index % 9) - 4) * 0.025; // 生成轻微旋转角度
        const sizePull = photo.kind === "retouched" ? 0.92 : 1; // 精修图略微靠近中心突出重点
        return createFlatTarget(x * 34 * scale * sizePull, y * 35 * scale - 20 * scale, z * scale, 0, tilt);
      }

      function buildOrbitTarget(photo, index) {
        // 生成星环布局中的照片位置
        const scale = getSceneScale(); // 获取当前视口缩放比例
        const angle = index * GOLDEN_ANGLE; // 用黄金角计算环形角度
        const radius = photo.kind === "retouched" ? 620 : 900 + (index % 4) * 72; // 精修图在内环，底片在外环
        const y = ((index % 31) - 15) * 42 * scale; // 把照片分布到纵向螺旋
        const x = Math.sin(angle) * radius * scale; // 计算环形 x 坐标
        const z = Math.cos(angle) * radius * scale; // 计算环形 z 坐标
        const tilt = ((index % 5) - 2) * 0.035; // 生成轻微旋转角度
        return createFacingTarget(x, y, z, x * 2, y, z * 2, tilt);
      }

      function buildCertificateTarget(photo, index) {
        // 生成婚书布局中的照片位置
        const scale = getSceneScale(); // 获取当前视口缩放比例
        const columns = window.innerWidth < 560 ? 7 : 13; // 根据屏幕宽度决定列数
        const leftColumns = Math.ceil(columns / 2); // 计算左页列数
        const rightColumns = columns - leftColumns; // 计算右页列数
        const row = Math.floor(index / columns); // 把索引转换成行号
        const col = index % columns; // 把索引转换成列号
        const isLeftPage = col < leftColumns; // 判断照片落在婚书左页还是右页
        const pageSide = isLeftPage ? -1 : 1; // 左页为负，右页为正
        const pageCol = isLeftPage ? col : col - leftColumns; // 换算当前页内部列号
        const pageColumns = isLeftPage ? leftColumns : rightColumns; // 获取当前页列数
        const centerCol = (pageColumns - 1) / 2; // 计算当前页的水平中心
        const rowOffset = window.innerWidth < 560 ? 8.5 : 4.6; // 根据屏幕宽度调整纵向中心
        const x = pageSide * 255 * scale + (pageCol - centerCol) * 138 * scale; // 计算婚书页内 x 坐标
        const y = (rowOffset - row) * 102 * scale; // 计算婚书页内 y 坐标
        const z = -120 * scale + Math.sin(row * 0.55) * 24 * scale; // 计算婚书页内景深
        const tilt = ((index % 3) - 1) * 0.018; // 生成轻微错落角度
        return createFlatTarget(x, y, z, pageSide * -0.24, tilt);
      }

      function createFlatTarget(x, y, z, rotateY, rotateZ) {
        // 创建面向镜头的平面布局目标
        const target = new THREE.Object3D(); // 创建目标对象
        target.position.set(x, y, z); // 设置目标位置
        target.rotation.set(0, rotateY, rotateZ); // 设置目标朝向
        return target;
      }

      function createFacingTarget(x, y, z, lookX, lookY, lookZ, rotateZ) {
        // 创建向外环绕的布局目标
        const target = new THREE.Object3D(); // 创建目标对象
        target.position.set(x, y, z); // 设置目标位置
        target.lookAt(lookX, lookY, lookZ); // 让照片朝向指定方向
        target.rotateZ(rotateZ); // 添加轻微旋转增强自然感
        return target;
      }

      function applyLayout(layoutName) {
        // 切换照片墙布局
        if (!targetLayouts[layoutName]) return; // 布局不存在时直接兜底返回
        activeLayout = layoutName; // 保存当前布局状态
        modeButtons.forEach((button) => {
          button.classList.toggle("is-active", button.dataset.layout === layoutName); // 同步按钮选中状态
        });
      }

      function updateObjects() {
        // 逐帧把照片插值到当前布局目标
        const targets = targetLayouts[activeLayout] || []; // 获取当前布局目标并兜底为空数组
        const damping = activeLayout === "certificate" ? 0.095 : 0.075; // 根据布局复杂度调整收敛速度
        objects.forEach((object, index) => {
          const target = targets[index]; // 读取当前照片目标
          if (!target) return; // 目标缺失时跳过当前照片
          object.position.lerp(target.position, damping); // 平滑插值照片位置
          object.quaternion.slerp(target.quaternion, damping); // 平滑插值照片朝向
        });
      }

      function animate() {
        // 启动并维持照片墙动画循环
        requestAnimationFrame(animate); // 请求下一帧动画
        updateObjects(); // 更新照片位置和朝向
        if (autoSpinEnabled && !viewerOpen) {
          photoGroup.rotation.y += activeLayout === "certificate" ? 0.0009 : 0.0017; // 预览未打开时缓慢旋转照片墙
          photoGroup.rotation.x += (Math.sin(Date.now() * 0.00022) * 0.035 - photoGroup.rotation.x) * 0.025; // 添加轻微呼吸起伏
        }
        controls.update(); // 更新拖拽控制器阻尼
        renderer.render(scene, camera); // 渲染当前帧
      }

      function handleResize() {
        // 窗口尺寸变化时同步相机、渲染器和布局
        const width = window.innerWidth; // 读取当前窗口宽度
        const height = window.innerHeight; // 读取当前窗口高度
        camera.aspect = width / height; // 更新相机宽高比
        camera.position.z = width < 760 ? 1880 : 1420; // 根据屏幕宽度调整相机距离
        camera.updateProjectionMatrix(); // 应用相机投影变化
        renderer.setSize(width, height); // 更新渲染尺寸
        rebuildLayouts(); // 重新计算响应式布局目标
      }

      function handlePointerDown(event) {
        // 记录指针按下位置
        pointerTracking = true; // 开始跟踪本次指针动作
        pointerStart = { x: event.clientX, y: event.clientY }; // 保存拖拽起点
        pointerMoved = false; // 重置拖拽状态
        pointerDownPhotoIndex = getPhotoIndexFromEvent(event); // 记录按下时的照片索引用于 PC 指针捕获兜底
      }

      function handlePointerMove(event) {
        // 根据移动距离判断是否拖拽
        if (!pointerTracking) return; // 未按下时不把鼠标移动误判为拖拽
        const distanceX = Math.abs(event.clientX - pointerStart.x); // 计算横向移动距离
        const distanceY = Math.abs(event.clientY - pointerStart.y); // 计算纵向移动距离
        if (distanceX + distanceY > 8) pointerMoved = true; // 超过阈值时标记为拖拽
      }

      function handlePointerUp() {
        // 指针抬起后结束拖拽跟踪
        pointerTracking = false; // 停止跟踪本次指针动作
        pointerDownPhotoIndex = -1; // 清理按下时记录的照片索引
      }

      function getPhotoIndexFromEvent(event) {
        // 从事件目标向上查找照片卡片索引
        const target = event.target; // 读取事件触发节点
        if (!target || !target.closest) return -1; // 事件目标不可查询时返回无效索引
        const card = target.closest(".photo-card"); // 查找最近的照片卡片
        if (!card) return -1; // 没有点到照片时返回无效索引
        const index = Number(card.dataset.index); // 将 DOM 字符串索引转换为数字
        return Number.isFinite(index) ? index : -1; // 索引有效时返回，否则兜底为无效索引
      }

      function handleRendererPointerUp(event) {
        // 在捕获阶段优先处理照片点击，避免 OrbitControls 抢掉 PC 鼠标事件
        const eventIndex = getPhotoIndexFromEvent(event); // 获取抬起时命中的照片索引
        const index = eventIndex >= 0 ? eventIndex : pointerDownPhotoIndex; // 使用按下时索引兜底 PC 指针捕获场景
        pointerTracking = false; // 指针抬起后结束拖拽跟踪
        pointerDownPhotoIndex = -1; // 清理按下时记录的照片索引
        if (index < 0) return; // 没有点到照片时不处理
        if (pointerMoved) return; // 发生拖拽时不打开预览
        event.preventDefault(); // 阻止按钮默认行为避免重复触发
        event.stopPropagation(); // 阻止事件继续交给 3D 控制器
        requestOpenViewer(index); // 打开照片预览
      }

      function handleRendererClick(event) {
        // 在捕获阶段保留 click 兜底，兼容桌面浏览器点击
        const index = getPhotoIndexFromEvent(event); // 获取被点击照片索引
        if (index < 0) return; // 没有点到照片时不处理
        if (pointerMoved) return; // 发生拖拽时不打开预览
        event.preventDefault(); // 阻止按钮默认行为避免重复触发
        event.stopPropagation(); // 阻止事件继续交给 3D 控制器
        requestOpenViewer(index); // 打开照片预览
      }

      function requestOpenViewer(index) {
        // 防止 pointerup 和 click 连续触发两次打开
        const now = performance.now(); // 读取当前时间用于去重
        if (now - lastOpenAt < 160) return; // 短时间重复触发时直接忽略
        lastOpenAt = now; // 记录本次打开时间
        openViewer(index); // 打开指定照片预览
      }

      function openViewer(index) {
        // 打开指定照片的预览弹层
        if (!photos.length) return; // 没有照片时直接返回
        currentIndex = normalizeIndex(index); // 规范化预览索引
        viewerOpen = true; // 标记预览弹层已打开
        renderViewerPhoto(); // 渲染当前预览照片
        viewer.classList.add("is-open"); // 显示预览弹层
        viewer.setAttribute("aria-hidden", "false"); // 同步无障碍状态
      }

      function closeViewer() {
        // 关闭照片预览弹层
        viewerOpen = false; // 标记预览弹层已关闭
        viewer.classList.remove("is-open"); // 隐藏预览弹层
        viewer.setAttribute("aria-hidden", "true"); // 同步无障碍状态
      }

      function renderViewerPhoto() {
        // 渲染当前索引对应的预览照片
        const photo = photos[currentIndex]; // 读取当前照片数据
        if (!photo) return; // 当前照片缺失时直接返回
        const requestToken = highResToken + 1; // 生成当前高清加载批次
        highResToken = requestToken; // 保存当前高清加载批次
        viewerImage.src = photo.thumb; // 先显示缩略图保证放大动画立即出现
        viewerImage.alt = photo.label; // 设置预览图片替代文本
        viewerOriginal.href = photo.original; // 设置原图跳转地址
        const highResImage = new Image(); // 创建高清图预加载对象
        highResImage.onload = () => {
          if (requestToken !== highResToken) return; // 旧请求完成时不覆盖当前预览
          viewerImage.src = photo.original; // 高清图加载完成后替换预览图片
        };
        highResImage.src = photo.original; // 异步加载原始大图
      }

      function normalizeIndex(index) {
        // 把任意索引转换到照片数组范围内
        const total = photos.length; // 读取照片总数
        if (total === 0) return 0; // 没有照片时返回 0 兜底
        return ((index % total) + total) % total; // 处理负数和越界索引
      }

      function showRelativePhoto(offset) {
        // 按偏移量切换预览照片
        currentIndex = normalizeIndex(currentIndex + offset); // 更新当前预览索引
        renderViewerPhoto(); // 渲染切换后的照片
      }

      modeButtons.forEach((button) => {
        button.addEventListener("click", () => {
          applyLayout(button.dataset.layout); // 点击按钮切换对应布局
        });
      });

      autoButton.addEventListener("click", () => {
        autoSpinEnabled = !autoSpinEnabled; // 切换自动旋转状态
        autoButton.classList.toggle("is-active", autoSpinEnabled); // 同步按钮选中状态
        autoButton.textContent = autoSpinEnabled ? "旋转" : "暂停"; // 同步按钮文字
      });

      document.querySelector("#closeViewer").addEventListener("click", closeViewer); // 点击关闭按钮关闭预览
      document.querySelector("#prevPhoto").addEventListener("click", () => showRelativePhoto(-1)); // 点击上一张切换照片
      document.querySelector("#nextPhoto").addEventListener("click", () => showRelativePhoto(1)); // 点击下一张切换照片
      viewer.addEventListener("click", (event) => {
        if (event.target === viewer) closeViewer(); // 点击遮罩区域关闭预览
      });

      window.addEventListener("keydown", (event) => {
        if (event.key === "Escape" && viewerOpen) closeViewer(); // 按 Esc 关闭预览
        if (event.key === "ArrowLeft" && viewerOpen) showRelativePhoto(-1); // 预览打开时按左键上一张
        if (event.key === "ArrowRight" && viewerOpen) showRelativePhoto(1); // 预览打开时按右键下一张
      });

      if (!autoSpinEnabled) {
        autoButton.classList.remove("is-active"); // 系统减少动态时关闭自动旋转按钮状态
        autoButton.textContent = "暂停"; // 系统减少动态时同步按钮文字
      }
    </script>
  </body>
</html>
